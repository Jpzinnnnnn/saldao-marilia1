<section class="hero" id="inicio">
  <!-- Background elements -->
  <div class="hero-bg">
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="bg-stripes"></div>
  </div>

  <!-- Floating tags -->
  <div class="floating-tags">
    <span class="tag tag-1"><i class="fas fa-fire"></i> Queima Estoque</span>
    <span class="tag tag-2"><i class="fas fa-percent"></i> Até 70% OFF</span>
    <span class="tag tag-3"><i class="fas fa-star"></i> Mais Vendidos</span>
    <span class="tag tag-4"><i class="fas fa-truck"></i> Retirada na Loja</span>
  </div>

  <div class="container hero-content">
    <div class="hero-text">
      <div class="hero-eyebrow">
        <span class="eyebrow-badge"><i class="fas fa-bolt"></i> PROMOÇÕES TODOS OS DIAS</span>
      </div>

      <h1 class="hero-title">
        <span class="title-line-1">MODA PARA</span>
        <span class="title-line-2">TODOS OS</span>
        <span class="title-line-3">ESTILOS</span>
      </h1>

      <p class="hero-subtitle">
        Camisetas, calças jeans, tênis, conjuntos e muito mais com <strong>preços imperdíveis</strong> em Marília/SP.
      </p>

      <div class="hero-actions">
        <button class="btn-primary btn-hero" (click)="scrollTo('produtos')">
          <i class="fas fa-shopping-bag"></i> Comprar Agora
        </button>
        <button class="btn-outline btn-hero-outline" (click)="scrollTo('promocoes')">
          <i class="fas fa-tag"></i> Ver Promoções
        </button>
      </div>
    </div>

    <!-- Hero Visual -->
    <div class="hero-visual">
      <div class="visual-frame">
        <img
          src="https://scontent-gru2-2.xx.fbcdn.net/v/t39.30808-6/468423609_122113663292594049_1044383585479556970_n.jpg?_nc_cat=102&ccb=1-7&_nc_sid=2a1932&_nc_eui2=AeF-R0xINzbSf1Km0wyF2ZkfkwRTdq-VCDeTBFN2r5UIN-UuRSweyqzEQg5ARgBgbnDTAmjAuuAJR5cxnhlkoDfl&_nc_ohc=4t-u0_mbAe8Q7kNvwH9Jbok&_nc_oc=Adrm_DxJiPtncQNLwfXHN1REqa-oX5i9OigiVl1nuK49uMP7HjJBDLGouNviMQ1B1bT6-cYhQIAPRtI-Vfr-6MQW&_nc_zt=23&_nc_ht=scontent-gru2-2.xx&_nc_gid=XiJ7-Stw8-3e5VVYCc56FQ&_nc_ss=7a3a8&oh=00_Af2ejqUwnRb4q1TR1HXcO1hL-xj6CaxwAzGmBEjs1oOJKw&oe=69EDD287"
          alt="Loja de roupas Saldão Marília"
          class="hero-img"
        />
        <div class="img-overlay"></div>

      </div>
      <div class="visual-decoration">
        <div class="deco-circle deco-1"></div>
        <div class="deco-circle deco-2"></div>
        <div class="deco-line deco-3"></div>
      </div>
    </div>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="container">
      <div class="stats-grid">
        <div class="stat" *ngFor="let stat of stats">
          <span class="stat-value">{{ stat.value }}</span>
          <span class="stat-label">{{ stat.label }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="scroll-indicator" (click)="scrollTo('produtos')">
    <i class="fas fa-chevron-down"></i>
  </div>
</section>
