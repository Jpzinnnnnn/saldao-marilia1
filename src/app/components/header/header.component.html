<header class="header" [class.scrolled]="isScrolled">
  <div class="header-top">
    <div class="container">
      <span><i class="fas fa-map-marker-alt"></i> Av. Sampaio Vidal, 734</span>
      <span><i class="fab fa-whatsapp"></i> (14) 99167-7085</span>
    </div>
  </div>

  <nav class="navbar">
    <div class="container">

      <div class="logo" (click)="scrollTo('inicio')">
        <span class="logo-saldao">SALDÃO</span>
        <span class="logo-marilia">MARÍLIA</span>
      </div>

      <ul class="nav-links">
        <li><a (click)="scrollTo('inicio')" class="nav-link">Início</a></li>
        <li><a (click)="scrollTo('produtos')" class="nav-link">Produtos</a></li>
        <li><a (click)="scrollTo('contato')" class="nav-link">Contato</a></li>
      </ul>

      <div class="header-actions">

        <button class="cart-btn" (click)="toggleCart()">
          <i class="fas fa-shopping-cart"></i>
          <span class="cart-count">{{ cart.getCount() }}</span>
        </button>

        <button class="hamburger" (click)="toggleMobileMenu()">
          <span></span>
          <span></span>
          <span></span>
        </button>

      </div>
    </div>
  </nav>

  <!-- Carrinho -->
  <div class="cart-panel" [class.open]="cartOpen">
  <div class="cart-header">
    <h3>Seu Carrinho</h3>
    <button (click)="toggleCart()">✕</button>
  </div>

  <div class="cart-body">

    <div *ngIf="cartItems.length === 0">
      Carrinho vazio
    </div>

    <div class="cart-item" *ngFor="let item of cartItems; let i = index">
      <img [src]="item.image">

      <div>
        <h4>{{ item.name }}</h4>
        <p>
          R$ {{ (item.price * item.quantity).toFixed(2) }}
          <span> (x{{ item.quantity }})</span>
        </p>
      </div>

      <button (click)="removeItem(i)">🗑</button>
    </div>

  </div>

  <div class="cart-footer" *ngIf="cartItems.length > 0">
    <strong>Total: R$ {{ getTotal().toFixed(2) }}</strong>

    <button class="finish-btn" (click)="finishOrder()">
      Finalizar no WhatsApp
    </button>
  </div>
</div>
</header>
